# ==============================================================================
# Dependabot Configuration
# ==============================================================================
# Automatically creates PRs to update dependencies.
# ==============================================================================

version: 2

updates:
  # GitHub Actions -- always keep these up to date
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    commit-message:
      prefix: "ci"
    labels:
      - "dependencies"
      - "github-actions"
    open-pull-requests-limit: 5

  # NuGet (.NET packages)
  - package-ecosystem: "nuget"
    directory: "/"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "deps"
    labels:
      - "dependencies"
      - "nuget"
    open-pull-requests-limit: 10
