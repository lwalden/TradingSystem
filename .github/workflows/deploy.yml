# ==============================================================================
# Deployment Workflow
# ==============================================================================
# Triggered manually (workflow_dispatch) or on release.
# ==============================================================================

name: Deploy

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to deploy to'
        required: true
        type: choice
        options:
          - development
          - staging
          - production
        default: development

  release:
    types: [published]

concurrency:
  group: deploy-${{ github.event.inputs.environment || 'production' }}
  cancel-in-progress: false

jobs:
  # ============================================================================
  # Determine deployment target
  # ============================================================================
  setup:
    runs-on: ubuntu-latest
    outputs:
      environment: ${{ steps.env.outputs.environment }}
      version: ${{ steps.env.outputs.version }}
    steps:
      - uses: actions/checkout@v6
      - name: Determine environment and version
        id: env
        run: |
          if [[ "${{ github.event_name }}" == "release" ]]; then
            echo "environment=production" >> $GITHUB_OUTPUT
            echo "version=${{ github.event.release.tag_name }}" >> $GITHUB_OUTPUT
          else
            echo "environment=${{ github.event.inputs.environment }}" >> $GITHUB_OUTPUT
            echo "version=dev-$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT
          fi

  # ============================================================================
  # Build and Deploy to Azure Functions
  # ============================================================================
  deploy:
    needs: setup
    runs-on: ubuntu-latest
    environment:
      name: ${{ needs.setup.outputs.environment }}
    steps:
      - uses: actions/checkout@v6

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Build and publish
        run: |
          dotnet restore
          dotnet publish src/TradingSystem.Functions/TradingSystem.Functions.csproj \
            --configuration Release \
            --output ./publish

      - name: Deploy placeholder
        run: |
          echo "Configure Azure Functions deployment."
          echo "Environment: ${{ needs.setup.outputs.environment }}"
          echo "Version: ${{ needs.setup.outputs.version }}"
          # TODO: Add Azure Functions deployment step
          # - uses: Azure/functions-action@v1
          #   with:
          #     app-name: 'trading-system-${{ needs.setup.outputs.environment }}'
          #     package: './publish'

  # ============================================================================
  # Post-deployment summary
  # ============================================================================
  notify:
    needs: [setup, deploy]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Deployment summary
        run: |
          echo "## Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "- **Environment:** ${{ needs.setup.outputs.environment }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Version:** ${{ needs.setup.outputs.version }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Triggered by:** ${{ github.actor }}" >> $GITHUB_STEP_SUMMARY
